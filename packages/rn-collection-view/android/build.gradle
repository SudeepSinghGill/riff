buildscript {
  ext.safeExtGet = {prop, fallback ->
    rootProject.ext.has(prop) ? rootProject.ext.get(prop) : fallback
  }
}

apply plugin: "com.android.library"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

android {
  namespace "com.riff"
  compileSdk safeExtGet("compileSdkVersion", 35)
  buildToolsVersion safeExtGet("buildToolsVersion", "35.0.0")

  defaultConfig {
    minSdk safeExtGet("minSdkVersion", 24)
    targetSdk safeExtGet("targetSdkVersion", 35)
  }

  lint {
    abortOnError false
    checkReleaseBuilds false
  }

  sourceSets {
    main {
      java.srcDirs = ["src/main/java"]
    }
  }
}

// extractReleaseAnnotations tries to download lint jars and fails behind a
// corporate proxy. Stub it out: create the empty typedefs.txt that
// syncReleaseLibJars expects, then disable the real task so it never runs.
afterEvaluate {
  def stubFile = file(
    "$buildDir/intermediates/annotations_typedef_file/release/extractReleaseAnnotations/typedefs.txt"
  )
  tasks.matching { it.name == "extractReleaseAnnotations" }.configureEach { t ->
    t.doFirst {
      stubFile.parentFile.mkdirs()
      if (!stubFile.exists()) stubFile.text = ""
    }
    t.onlyIf { false }
    t.outputs.file(stubFile)
  }
}
dependencies {
  implementation "com.facebook.react:react-android"
}
